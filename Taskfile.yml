# Anvil — run `task` to list. Uses vendored binaries in node_modules/.bin.
version: "3"

vars:
  VITE: node_modules/.bin/vite
  TAURI: node_modules/.bin/tauri
  SC: node_modules/.bin/svelte-check
  VT: node_modules/.bin/vitest

tasks:
  default:
    desc: List tasks
    cmds: [task --list]
    silent: true

  dev:
    desc: Run the app (hot-reload, debug build — slower)
    cmds: ["{{.TAURI}} dev"]

  run:
    desc: Run the app on a RELEASE build (fast — judge perf with this)
    cmds: ["{{.TAURI}} dev --release"]

  app:
    desc: Build + install a release Anvil.app to /Applications
    cmds:
      - "{{.VITE}} build"
      # tauri's updater-signing step errors locally (no TAURI_SIGNING_PRIVATE_KEY)
      # AFTER the .app is bundled — tolerate it, then verify the bundle exists.
      - "{{.TAURI}} build --bundles app || true"
      - test -d src-tauri/target/release/bundle/macos/Anvil.app
      - pkill -9 anvil || true
      - rm -rf /Applications/Anvil.app
      - cp -R src-tauri/target/release/bundle/macos/Anvil.app /Applications/Anvil.app
      - xattr -cr /Applications/Anvil.app
      - open /Applications/Anvil.app

  check:
    desc: Type-check (svelte) + Rust check
    cmds:
      - "{{.SC}} --tsconfig ./tsconfig.json"
      - cd src-tauri && cargo check

  test:
    desc: Tests — vitest + cargo
    cmds:
      - "{{.VT}} run"
      - cd src-tauri && cargo test

  cover:
    desc: Frontend coverage report
    cmds: ["{{.VT}} run --coverage"]

  fmt:
    desc: Format Rust
    cmds: [cd src-tauri && cargo fmt]

  lint:
    desc: Rust clippy
    cmds: [cd src-tauri && cargo clippy]

  clean:
    desc: Kill stray dev servers, free port 1420, kill stale app windows
    cmds:
      - pkill -f "tauri.js dev" || true
      - pkill -f vite || true
      - lsof -tiTCP:1420 -sTCP:LISTEN | xargs -r kill -9 || true
      - pkill -9 -f "target/debug/anvil" || true
      - echo "clean — now 'task dev' or 'task run'"

  fix:
    desc: Recover a blank/poisoned local app (clears WKWebView state, then reboot)
    cmds:
      - pkill -9 anvil || true
      - rm -rf ~/Library/WebKit/com.pjanderson.anvil ~/Library/Caches/com.pjanderson.anvil ~/Library/HTTPStorages/com.pjanderson.anvil
      - echo "Cleared WKWebView state. Reboot, then 'task app'."
