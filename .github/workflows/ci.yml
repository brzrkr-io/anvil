name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Zig toolchain
        uses: actions/cache@v4
        with:
          path: .zig
          key: zig-${{ hashFiles('tools/zig-version') }}

      - name: Fetch pinned Zig compiler
        run: ./tools/get-zig.sh

      - name: Format check
        run: .zig/zig fmt --check src build.zig

      - name: Build
        run: .zig/zig build

      - name: Test
        run: .zig/zig build test

      - name: Headless render smoke check
        run: |
          ./zig-out/bin/anvil --dump /tmp/anvil-ci.png
          test -s /tmp/anvil-ci.png
