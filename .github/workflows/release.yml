name: Release

# Tag a version (e.g. `git tag v0.1.1 && git push --tags`) to build signed
# installers + updater artifacts on every OS and publish a draft GitHub Release.
#
# Requires these repo secrets to produce *signed* auto-update artifacts (#98):
#   TAURI_SIGNING_PRIVATE_KEY           — `tauri signer generate` private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — its password (if set)
# Without them the release still builds unsigned installers (#99).
# macOS notarization (#97) additionally needs APPLE_CERTIFICATE / APPLE_ID secrets.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        # Anvil is a macOS app — release the macOS bundle only.
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libayatana-appindicator3-dev build-essential curl wget file

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build, sign + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code-signing + notarization intentionally omitted: no paid
          # Apple Developer cert. tauri-action ad-hoc signs the .app (Gatekeeper
          # shows an "unidentified developer" warning — right-click > Open to
          # bypass). Auto-update artifacts (.app.tar.gz + .sig + latest.json)
          # are still signed by TAURI_SIGNING_PRIVATE_KEY.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Anvil ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
