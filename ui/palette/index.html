<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root { --bg: #0b0d0e; --fg: #e8e6e3; --accent: #2f7f86; }
  html, body { margin: 0; height: 100%; }
  body {
    background: transparent;
    display: none;
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
  }
  body.visible { display: block; }
  #backdrop {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.45);
    display: flex; justify-content: center; align-items: flex-start;
  }
  #palette {
    margin-top: 12vh; width: 540px; max-width: 90vw;
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 8px; overflow: hidden;
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
  }
  #query {
    width: 100%; box-sizing: border-box; padding: 14px 16px;
    background: var(--bg); color: var(--fg);
    border: none; outline: none; font-size: 15px;
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  #list { list-style: none; margin: 0; padding: 6px; max-height: 320px; overflow-y: auto; }
  #list li {
    padding: 9px 12px; border-radius: 5px; color: var(--fg);
    cursor: pointer; display: flex; justify-content: space-between;
  }
  #list li .sub { opacity: 0.5; font-size: 12px; }
  #list li.sel { background: var(--accent); color: var(--bg); }
  #list li.sel .sub { opacity: 0.8; }
</style>
</head>
<body>
<div id="backdrop">
  <div id="palette">
    <input id="query" type="text" placeholder="Type a command…" autocomplete="off" spellcheck="false">
    <ul id="list"></ul>
  </div>
</div>
<script>
(function () {
  var commands = [], filtered = [], sel = 0;
  // Per-session recency scores keyed by item id. No disk persistence.
  var recency = {};
  var body = document.body;
  var query = document.getElementById('query');
  var list = document.getElementById('list');
  var backdrop = document.getElementById('backdrop');

  function post(obj) {
    window.webkit.messageHandlers.anvil.postMessage(JSON.stringify(obj));
  }

  // Returns a numeric match score for needle against hay (lowercased title).
  // 0 means no match. Higher is better.
  function score(needle, hay) {
    if (needle === '') return 1; // empty query: everything passes with equal score
    var n = needle.toLowerCase();
    var h = hay.toLowerCase();
    // Substring match: highest score.
    if (h.indexOf(n) !== -1) return 100;
    // Word-start match: any word in hay starts with needle.
    var words = h.split(/[\s.\-_:]+/);
    for (var w = 0; w < words.length; w++) {
      if (words[w].indexOf(n) === 0) return 70;
    }
    // Subsequence match: needle chars appear in order in hay.
    var i = 0;
    for (var j = 0; j < h.length && i < n.length; j++) {
      if (h[j] === n[i]) i++;
    }
    if (i === n.length) return 10;
    return 0; // no match
  }

  function render() {
    var q = query.value.trim();
    // Filter then sort by score + recency.
    filtered = commands
      .map(function (c) {
        var s = score(q, c.title);
        return { cmd: c, s: s + (recency[c.id] || 0) };
      })
      .filter(function (x) { return x.s > 0; })
      .sort(function (a, b) { return b.s - a.s; })
      .map(function (x) { return x.cmd; });
    if (sel >= filtered.length) sel = Math.max(0, filtered.length - 1);
    list.innerHTML = '';
    filtered.forEach(function (c, idx) {
      var li = document.createElement('li');
      if (idx === sel) li.className = 'sel';
      var title = document.createElement('span');
      title.textContent = c.title;
      li.appendChild(title);
      if (c.subtitle) {
        var sub = document.createElement('span');
        sub.className = 'sub';
        sub.textContent = c.subtitle;
        li.appendChild(sub);
      }
      li.addEventListener('click', function () { invoke(idx); });
      list.appendChild(li);
    });
  }

  function invoke(idx) {
    if (idx >= 0 && idx < filtered.length) {
      var id = filtered[idx].id;
      // Update recency: bump invoked item, decay all others by 0.9.
      var keys = Object.keys(recency);
      for (var k = 0; k < keys.length; k++) {
        recency[keys[k]] *= 0.9;
      }
      recency[id] = (recency[id] || 0) * 0.9 + 20;
      post({ type: 'invoke', id: id });
    }
  }

  window.anvil = {
    receive: function (msg) {
      if (msg.type === 'show') {
        commands = msg.commands || [];
        if (msg.theme) {
          var r = document.documentElement.style;
          r.setProperty('--bg', msg.theme.background);
          r.setProperty('--fg', msg.theme.foreground);
          r.setProperty('--accent', msg.theme.accent);
        }
        query.value = '';
        sel = 0;
        render();
        body.classList.add('visible');
        query.focus();
      } else if (msg.type === 'hide') {
        body.classList.remove('visible');
        query.value = '';
        sel = 0;
      }
    }
  };

  query.addEventListener('input', render);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      post({ type: 'dismiss' });
      e.preventDefault();
    } else if (e.key === 'ArrowDown') {
      if (sel < filtered.length - 1) { sel++; render(); }
      e.preventDefault();
    } else if (e.key === 'ArrowUp') {
      if (sel > 0) { sel--; render(); }
      e.preventDefault();
    } else if (e.key === 'Enter') {
      invoke(sel);
      e.preventDefault();
    }
  });

  backdrop.addEventListener('mousedown', function (e) {
    if (e.target === backdrop) post({ type: 'dismiss' });
  });

  post({ type: 'ready' });
})();
</script>
</body>
</html>
